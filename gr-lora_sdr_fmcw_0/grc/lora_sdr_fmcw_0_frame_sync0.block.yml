
id: lora_sdr_fmcw_0_frame_sync0
label: Frame sync0
category: '[LoRa_RX]'
flags: [python,cpp]

parameters:
-   id: center_freq
    label: Center_freq
    dtype: real
-   id: bandwidth
    label: Bandwidth
    dtype: int
-   id: sf
    label: Sf
    dtype: int
-   id: impl_head
    label: Impl_head
    dtype: bool
-   id: sync_word
    label: Sync word
    dtype: int_vector
    default: 0x12
    hide: part
-   id: preamb_len
    label: Preamble_len
    dtype: int
    default: 8
    hide: part
-   id: fmcw_preamble_len
    label: FMCW preamble triangles
    dtype: int
    default: -1
    hide: part
-   id: os_factor
    label: os_factor
    dtype: int
    default: 4
-   id: detect_corr_threshold
    label: Detect corr threshold
    dtype: real
    default: 0.45
-   id: show_log_port
    dtype: enum
    options: ['True', 'False']
    hide: part
    default: 'False'


inputs:
-   domain: stream
    dtype: complex
-   domain: message
    id: frame_info

outputs:
-   domain: stream
    dtype: complex
-   domain: stream
    label: log
    dtype: float
    optional: 1
    hide: ${False if str(show_log_port)=='True' else True}

templates:
    imports: import gnuradio.lora_sdr_fmcw_0 as lora_sdr
    make: lora_sdr.frame_sync0(${center_freq}, ${bandwidth}, ${sf}, ${impl_head}, ${sync_word}, ${os_factor},${preamb_len}, ${detect_corr_threshold}, ${fmcw_preamble_len})

asserts:
- ${fmcw_preamble_len==-1 or fmcw_preamble_len>=0}
- ${fmcw_preamble_len==-1 or fmcw_preamble_len<=preamb_len}

cpp_templates:
    includes: ['#include "frame_sync.h"']
    declarations: 'lora_sdr::frame_sync::sptr ${id};'
    make: 'this->${id} = lora_sdr_fmcw_0::frame_sync0::make(${center_freq}, ${bandwidth}, ${sf}, ${impl_head}, ${sync_word}, ${os_factor},${preamb_len}, ${detect_corr_threshold}, ${fmcw_preamble_len});'
    translations:
        'False': 'false'
        'True': 'true'
        \[: '{'
        \]: '}'
 

documentation: |-
    Block taking care of the preamble detection, CFO and STO estimation and correction.
        Parameters:
            center_freq: the RF center frequency [Hz]
            Bandwidth: Bandwidth [Hz]
            sf: spreading factor
            impl_head: usage of an implicit header (explicit will be used otherwise)
            sync_word: The frame sync word. Can be specified as an hex or dec value (e.g. 0x12 or 18), or directly as the decimal values modulating the two network identifiers upchirps in the preamble (e.g [8,16]). The values [0,0] will ignore sync word verification and print the detected values.
            preamb_len: Total number of preamble upchirp units. Should be in [6-65535] (default value 8);
            fmcw_preamble_len: Number of external FMCW triangles at the beginning of the mixed preamble. Use -1 to keep legacy all-FMCW behavior.
            os_factor: oversampling factor of the input stream compared to the signal bandwidth. Oversampling is used to compensate STO and SFO.
            detect_corr_threshold: minimum normalized correlation required to accept an FMCW up-sweep detection.
        Input:
            in: stream of complex valued sampled
            frame_info: message produced by the block header decoder, containing the frame coding rate, the payload length, and the presence of a payload crc.

        Output:
            out: stream of complex samples with tags indicating the beginning of the header and preamble part of each frame alongside all information necessary to the demodulation, such as: spreading factor, coding rate, payload length, CRC presence, CFO estimate, and usage of LDRO.
            log: (Optional) Output the estimated value of SNR, CFO, STO, SFO, Off-by-one as a stream of float. Those values can be logged by a file_sink and read in an external application (MATLAB, Python, ...)
file_format: 1
